name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt pyinstaller

      - name: Criar config.py a partir dos Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        shell: pwsh
        run: |
          (Get-Content config.example.py -Raw) `
            -replace 'COLE_SUA_URL_AQUI',      $env:SUPABASE_URL `
            -replace 'COLE_SUA_ANON_KEY_AQUI', $env:SUPABASE_ANON_KEY |
            Set-Content config.py -Encoding UTF8

      - name: Buildar exe (PyInstaller)
        run: pyinstaller FinancasApp.spec --noconfirm

      - name: Assinar exe
        env:
          CERT_B64: ${{ secrets.CODE_SIGNING_CERT }}
          CERT_PASS: ${{ secrets.CODE_SIGNING_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:CERT_B64) { Write-Host "Sem certificado configurado — pulando assinatura."; exit 0 }
          [IO.File]::WriteAllBytes('cert.pfx', [Convert]::FromBase64String($env:CERT_B64))
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $st sign /f cert.pfx /p $env:CERT_PASS `
              /tr http://timestamp.sectigo.com /td sha256 /fd sha256 `
              dist\destino.exe
          Remove-Item cert.pfx

      - name: Publicar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/destino.exe
          generate_release_notes: true
