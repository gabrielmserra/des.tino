<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>des.tino — Redefinir senha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 1px;
      margin-bottom: 28px;
    }
    .logo span:nth-child(1) { font-size: 22px; font-weight: 700; color: #e2e8f0; }
    .logo span:nth-child(2) { font-size: 22px; font-weight: 700; color: #3b82f6; }
    .logo span:nth-child(3) { font-size: 22px; font-weight: 400; color: #e2e8f0; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #22253a;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    input[type="password"]::placeholder { color: #4b5563; }

    button {
      width: 100%;
      padding: 11px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .message.error   { background: #2d1515; border: 1px solid #7f1d1d; color: #f87171; display: block; }
    .message.success { background: #0f2d1a; border: 1px solid #14532d; color: #4ade80; display: block; }

    .loading-state, .invalid-state, .success-state { display: none; text-align: center; padding: 16px 0; }
    .loading-state.visible, .invalid-state.visible, .success-state.visible { display: block; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2d3e;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .check-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .form-state { display: none; }
    .form-state.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>des</span><span>.</span><span>tino</span>
    </div>

    <!-- Carregando -->
    <div class="loading-state visible" id="stateLoading">
      <div class="spinner"></div>
      <p style="color:#6b7280;font-size:14px;">Verificando link…</p>
    </div>

    <!-- Link inválido ou expirado -->
    <div class="invalid-state" id="stateInvalid">
      <div class="check-icon">⚠️</div>
      <h1>Link inválido</h1>
      <p class="subtitle" style="margin-top:8px;">
        Este link expirou ou já foi utilizado.<br>
        Solicite um novo link no app.
      </p>
    </div>

    <!-- Formulário -->
    <div class="form-state" id="stateForm">
      <h1>Redefinir senha</h1>
      <p class="subtitle">Digite e confirme sua nova senha.</p>

      <label for="password">Nova senha</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />

      <label for="confirm">Confirmar senha</label>
      <input type="password" id="confirm" placeholder="Repita a senha" autocomplete="new-password" />

      <button id="btnSave" onclick="handleSubmit()">Salvar nova senha</button>
      <div class="message" id="msgError"></div>
    </div>

    <!-- Sucesso -->
    <div class="invalid-state" id="stateSuccess">
      <div class="check-icon">✅</div>
      <h1>Senha atualizada!</h1>
      <p class="subtitle" style="margin-top:8px;">
        Sua senha foi redefinida com sucesso.<br>
        Abra o des.tino e faça login normalmente.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL      = "https://wbnefvskqudjnmafpqnn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibmVmdnNrcXVkam5tYWZwcW5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTI1MTUsImV4cCI6MjA5MjQyODUxNX0._Msovj0x6RAwJhqb0mIDRx7NOWIJEvDs_tHHlP3UrkE";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function show(id) {
      ["stateLoading","stateInvalid","stateForm","stateSuccess"].forEach(s => {
        document.getElementById(s).classList.remove("visible");
      });
      document.getElementById(id).classList.add("visible");
    }

    function showError(msg) {
      const el = document.getElementById("msgError");
      el.textContent = msg;
      el.className = "message error";
    }

    // Detecta o token de recuperação no hash da URL
    async function init() {
      const hash   = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const type   = params.get("type");
      const access = params.get("access_token");
      const refresh = params.get("refresh_token");

      if (type !== "recovery" || !access) {
        show("stateInvalid");
        return;
      }

      try {
        const { error } = await client.auth.setSession({
          access_token:  access,
          refresh_token: refresh || "",
        });
        if (error) throw error;
        show("stateForm");
        document.getElementById("password").focus();
      } catch {
        show("stateInvalid");
      }
    }

    async function handleSubmit() {
      const pwd     = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const btn     = document.getElementById("btnSave");

      if (pwd.length < 6) { showError("A senha deve ter pelo menos 6 caracteres."); return; }
      if (pwd !== confirm) { showError("As senhas não coincidem."); return; }

      btn.disabled  = true;
      btn.textContent = "Salvando…";

      try {
        const { error } = await client.auth.updateUser({ password: pwd });
        if (error) throw error;
        show("stateSuccess");
      } catch (e) {
        showError(e.message || "Erro ao atualizar senha. Tente novamente.");
        btn.disabled = false;
        btn.textContent = "Salvar nova senha";
      }
    }

    init();
  </script>
</body>
</html>
